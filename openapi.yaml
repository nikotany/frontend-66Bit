openapi: 3.0.1
info:
  title: Employees
  version: '1.0'
paths:
  /api/Employee/{id}:
    get:
      tags:
        - Employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
  /api/Employee:
    get:
      tags:
        - Employee
      parameters:
        - name: Page
          in: query
          schema:
            maximum: 2147483647
            minimum: 1
            type: integer
            format: int32
        - name: Count
          in: query
          schema:
            maximum: 2147483647
            minimum: 0
            type: integer
            format: int32
        - name: Name
          in: query
          schema:
            type: string
        - name: Gender
          in: query
          schema:
            type: array
            items:
              $ref: '#/components/schemas/Gender'
        - name: Position
          in: query
          schema:
            type: array
            items:
              $ref: '#/components/schemas/Position'
        - name: Stack
          in: query
          schema:
            type: array
            items:
              $ref: '#/components/schemas/Technology'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Employee'
components:
  schemas:
    Employee:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        photo:
          type: string
          format: uri
        phone:
          type: string
        gender:
          type: string
          description: Localized gender label (e.g. "Мужчина", "Женщина")
        position:
          type: string
          description: Localized position label (e.g. "Frontend-разработчик")
        stack:
          type: array
          items:
            type: string
        birthdate:
          type: string
          description: Localized date string
        dateOfEmployment:
          type: string
          description: Localized date string
      required:
        - id
        - name
        - photo
        - phone
        - gender
        - position
        - stack
        - birthdate
        - dateOfEmployment
    Gender:
      enum:
        - Male
        - Female
      type: string
    Position:
      enum:
        - Frontend
        - Backend
        - Analyst
        - Manager
        - Designer
      type: string
    Technology:
      enum:
        - CSharp
        - React
        - Java
        - PHP
        - Figma
        - Word
      type: string
